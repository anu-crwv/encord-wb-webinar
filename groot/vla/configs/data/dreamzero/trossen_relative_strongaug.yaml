# @package _global_
#
# Data config for the Trossen AI mobile bimanual embodiment (Encord export).
# 16-dim packed state+action (single keys state.state / action.action), 3 cameras, language from
# the per-frame task_index -> tasks.jsonl (oxe_droid-style annotation.language.* keys).
#
# Absolute actions: with single packed keys there is no shared sub-key between state and action, so
# relative-action stats don't apply (relative_action=false -> no relative_stats file needed).
#
# Set the dataset path via CLI: trossen_data_root=/data/wam/datasets/encord_trossen
defaults:
  - dreamzero/base_48_wan_fine_aug_relative_strongaug
  - _self_  # this file overrides the base

max_state_dim: 64
use_global_metadata: false
relative_action: false
relative_action_per_horizon: false
relative_action_keys: []
max_chunk_size: 5
dataset_shard_sampling_rate: 0.1
mixture_dataset_cls: groot.vla.data.dataset.lerobot_sharded.ShardedLeRobotMixtureDataset.from_mixture_spec
single_dataset_cls: groot.vla.data.dataset.lerobot_sharded.ShardedLeRobotSubLangSingleActionChunkDatasetDROID

trossen_data_root: ???

train_dataset:
  _target_: ${mixture_dataset_cls}
  _convert_: object
  mixture_spec:
    - dataset_path:
        trossen:
          - ${trossen_data_root}
      dataset_weight: 1.0
      distribute_weights: true

  dataset_class: ${single_dataset_cls}
  all_modality_configs: ${modality_configs}
  all_transforms: ${transforms}
  metadata_versions: ${metadata_versions}
  fps: ${fps}
  dataset_kwargs:
    video_backend: decord
    use_global_metadata: ${use_global_metadata}
    max_chunk_size: ${max_chunk_size}
    relative_action: ${relative_action}
    relative_action_keys: ${relative_action_keys}
    relative_action_per_horizon: ${relative_action_per_horizon}
  mixture_kwargs:
    training: true
    balance_dataset_weights: false
    seed: 42
    shard_sampling_rate: ${dataset_shard_sampling_rate}
