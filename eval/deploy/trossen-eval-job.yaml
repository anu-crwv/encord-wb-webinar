# Trossen DreamZero closed-loop sim eval Job (Isaac Lab-Arena).
# Runs in the Isaac Sim image as root (namespace PSA = baseline), runtime-installs
# IsaacLab + Arena (cached on the PVC), and runs eval/runner.sh which registers our
# Trossen embodiment + DreamZero policy and drives Arena's eval_runner.
# Prereq: the dreamzero-trossen-inference Deployment is scaled to 1 (policy server).
apiVersion: batch/v1
kind: Job
metadata:
  name: trossen-eval
  namespace: dreamzero
  labels: {app.kubernetes.io/part-of: dreamzero, dreamzero/gate: "trossen-eval"}
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 259200
  template:
    metadata:
      labels: {app: trossen-eval, app.kubernetes.io/part-of: dreamzero, dreamzero/gate: "trossen-eval"}
    spec:
      restartPolicy: Never
      # Root is required for the Isaac Sim image (/isaac-sim/python.sh); allowed under baseline PSA.
      securityContext: {runAsUser: 0, runAsGroup: 0, fsGroup: 0}
      nodeSelector:
        kubernetes.io/arch: amd64
        nvidia.com/gpu.product: NVIDIA-RTX-PRO-6000-Blackwell-Server-Edition
      tolerations:
        - {key: is_gpu, value: "true", operator: Equal, effect: PreferNoSchedule}
      containers:
        - name: eval
          image: nvcr.io/nvidia/isaac-sim:6.0.0-dev2
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/data/src/dreamzero-wam/eval/runner.sh"]
          envFrom: [{secretRef: {name: wandb-api-key}}]
          env:
            - {name: ACCEPT_EULA, value: "Y"}
            - {name: PRIVACY_CONSENT, value: "Y"}
            - {name: OMNI_KIT_ACCEPT_EULA, value: "YES"}
            - {name: DZ_HOST, value: "dreamzero-trossen-inference"}
            - {name: DZ_PORT, value: "8001"}
            - {name: WANDB_ENTITY, value: encord-wb-physical-ai}
            - {name: WANDB_PROJECT, value: wam-finetune-webinar}
            - {name: WEAVE_PROJECT, value: "wam-finetune-webinar"}
            # Checkpoint under eval — also the Weave leaderboard model label. Must match
            # the server's LORA_ARTIFACT (bump to :v4 once the 3000-step run finishes).
            - {name: LORA_ARTIFACT, value: "encord-wb-physical-ai/wam-finetune-webinar/dreamzero-trossen-lora:v5"}
            # W&B run tags for navigation (auto-tags add eval/trossen/<version>).
            - {name: WAM_EVAL_TAGS, value: "full-scale,3000-steps,domain-match,fov87,cfg12"}
            - {name: WAM_EVAL_VIDEO_DIR, value: "/data/wam/eval_videos"}
            # Domain-MATCH (not randomize): a consistent real-ish look (fixed indoor HDR + moderate
            # light + the ~87deg D405 FOV) to pull the synthetic frames back in-distribution for the
            # action head. Randomizing the look (=1) only adds more OOD variety, which we don't want
            # when evaluating a fixed real-data model.
            - {name: WAM_DOMAIN_RAND, value: "0"}
            # Raised work-table pose calibrated via debug_cameras.py (objects reachable + cameras framed).
            - {name: WAM_TABLE_X, value: "0.20"}
            - {name: WAM_EVAL_SRC, value: "/data/src/dreamzero-wam/eval"}
            - {name: PYTHONUNBUFFERED, value: "1"}
          resources:
            requests: {cpu: "8", memory: 64Gi, nvidia.com/gpu: "1"}
            limits:   {cpu: "32", memory: 200Gi, nvidia.com/gpu: "1"}
          volumeMounts:
            - {name: data,        mountPath: /data}
            - {name: checkpoints, mountPath: /checkpoints}
            - {name: dshm,        mountPath: /dev/shm}
      volumes:
        - {name: data,        persistentVolumeClaim: {claimName: dreamzero-data}}
        - {name: checkpoints, persistentVolumeClaim: {claimName: dreamzero-checkpoints}}
        - {name: dshm,        emptyDir: {medium: Memory, sizeLimit: 32Gi}}
