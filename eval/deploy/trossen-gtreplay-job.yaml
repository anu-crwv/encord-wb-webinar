# Tier-0.3: ground-truth action replay. Feeds a REAL episode's recorded 16-dim
# joint-target trajectory (eval/gt_actions_ep0.npy) straight into the Trossen sim
# controller — NO model, NO policy server. Tests the sim action-application path in
# isolation: if the arm reproduces the real reach (gripper descends toward the table),
# the controller/embodiment plumbing is correct and the closed-loop hover is the
# model/perception; if the arm does NOT descend, the sim action interface is broken
# and no retraining can ever demo. Runs eval/replay_gt_actions.py via WAM_EVAL_ENTRY.
apiVersion: batch/v1
kind: Job
metadata:
  name: trossen-gtreplay
  namespace: dreamzero
  labels: {app.kubernetes.io/part-of: dreamzero, dreamzero/gate: "trossen-eval"}
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 259200
  template:
    metadata:
      labels: {app: trossen-gtreplay, app.kubernetes.io/part-of: dreamzero, dreamzero/gate: "trossen-eval"}
    spec:
      restartPolicy: Never
      securityContext: {runAsUser: 0, runAsGroup: 0, fsGroup: 0}
      nodeSelector:
        kubernetes.io/arch: amd64
        nvidia.com/gpu.product: NVIDIA-RTX-PRO-6000-Blackwell-Server-Edition
      tolerations:
        - {key: is_gpu, value: "true", operator: Equal, effect: PreferNoSchedule}
      containers:
        - name: eval
          image: nvcr.io/nvidia/isaac-sim:6.0.0-dev2
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/data/src/dreamzero-wam/eval/runner.sh"]
          env:
            - {name: ACCEPT_EULA, value: "Y"}
            - {name: PRIVACY_CONSENT, value: "Y"}
            - {name: OMNI_KIT_ACCEPT_EULA, value: "YES"}
            # GT replay needs NO policy server.
            - {name: WAM_EVAL_ENTRY, value: "replay_gt_actions.py"}
            - {name: WAM_SKIP_SERVER_PROBE, value: "1"}
            # Same raised-table scene as the eval (so the arm has a table to descend toward).
            - {name: WAM_TABLE_X, value: "0.20"}
            - {name: WAM_CUBE_X, value: "0.55"}
            - {name: WAM_CUBE_Y, value: "0.15"}
            - {name: WAM_BOWL_X, value: "0.80"}
            - {name: WAM_BOWL_Y, value: "-0.30"}
            - {name: WAM_EVAL_SRC, value: "/data/src/dreamzero-wam/eval"}
            - {name: PYTHONUNBUFFERED, value: "1"}
          resources:
            requests: {cpu: "8", memory: 64Gi, nvidia.com/gpu: "1"}
            limits:   {cpu: "32", memory: 200Gi, nvidia.com/gpu: "1"}
          volumeMounts:
            - {name: data,        mountPath: /data}
            - {name: checkpoints, mountPath: /checkpoints}
            - {name: dshm,        mountPath: /dev/shm}
      volumes:
        - {name: data,        persistentVolumeClaim: {claimName: dreamzero-data}}
        - {name: checkpoints, persistentVolumeClaim: {claimName: dreamzero-checkpoints}}
        - {name: dshm,        emptyDir: {medium: Memory, sizeLimit: 32Gi}}
