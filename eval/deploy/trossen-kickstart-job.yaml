# Closed-loop KICKSTART experiment (eval/run_trossen_kickstart.py). Needs the policy server.
# Runs a LIST of [seed_mode,N,K] configs sequentially in ONE job (one Arena setup, one warm
# server -> no cross-job contention). Reports POST-HANDOVER gripper->object progress.
# Override WAM_KICK_CONFIGS to run the seed-length / hold / direction sweep.
apiVersion: batch/v1
kind: Job
metadata:
  name: trossen-kicksweep
  namespace: dreamzero
  labels: {app.kubernetes.io/part-of: dreamzero, dreamzero/gate: "trossen-eval"}
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 259200
  template:
    metadata:
      labels: {app: trossen-kickstart, app.kubernetes.io/part-of: dreamzero, dreamzero/gate: "trossen-eval"}
    spec:
      restartPolicy: Never
      securityContext: {runAsUser: 0, runAsGroup: 0, fsGroup: 0}
      nodeSelector:
        kubernetes.io/arch: amd64
        nvidia.com/gpu.product: NVIDIA-RTX-PRO-6000-Blackwell-Server-Edition
      tolerations:
        - {key: is_gpu, value: "true", operator: Equal, effect: PreferNoSchedule}
      containers:
        - name: eval
          image: nvcr.io/nvidia/isaac-sim:6.0.0-dev2
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/data/src/dreamzero-wam/eval/runner.sh"]
          env:
            - {name: ACCEPT_EULA, value: "Y"}
            - {name: PRIVACY_CONSENT, value: "Y"}
            - {name: OMNI_KIT_ACCEPT_EULA, value: "YES"}
            - {name: WAM_EVAL_ENTRY, value: "run_trossen_kickstart.py"}
            - {name: DZ_HOST, value: "dreamzero-trossen-inference"}
            - {name: DZ_PORT, value: "8001"}
            # Core confirming set by default: baseline(N=0) + scripted_toward N=8 + ep35_gt N=8.
            # Override for the sweep, e.g. WAM_KICK_CONFIGS='[["scripted_toward",4,0],...]'.
            - {name: WAM_KICK_CONFIGS, value: '[["scripted_toward",0,0],["ep35_gt",8,0],["ep35_gt",16,0],["ep35_gt",24,0],["scripted_pregrasp",8,0],["scripted_neutral",8,0],["ep35_gt",16,4],["ep35_gt",16,8]]'}
            - {name: WAM_KICK_EPISODES, value: "5"}
            - {name: WAM_EVAL_MAX_STEPS, value: "130"}
            - {name: WAM_RESET_JITTER, value: "0.05"}
            - {name: WAM_SEED_ACTIONS, value: "/data/wam/arladder/ep35_seed_actions.npy"}
            - {name: WAM_DOMAIN_RAND, value: "0"}
            - {name: WAM_TABLE_X, value: "0.20"}
            - {name: WAM_CUBE_X, value: "0.55"}
            - {name: WAM_CUBE_Y, value: "0.15"}
            - {name: WAM_BOWL_X, value: "0.80"}
            - {name: WAM_BOWL_Y, value: "-0.30"}
            - {name: WAM_EVAL_SRC, value: "/data/src/dreamzero-wam/eval"}
            - {name: PYTHONUNBUFFERED, value: "1"}
          resources:
            requests: {cpu: "8", memory: 64Gi, nvidia.com/gpu: "1"}
            limits:   {cpu: "32", memory: 200Gi, nvidia.com/gpu: "1"}
          volumeMounts:
            - {name: data,        mountPath: /data}
            - {name: checkpoints, mountPath: /checkpoints}
            - {name: dshm,        mountPath: /dev/shm}
      volumes:
        - {name: data,        persistentVolumeClaim: {claimName: dreamzero-data}}
        - {name: checkpoints, persistentVolumeClaim: {claimName: dreamzero-checkpoints}}
        - {name: dshm,        emptyDir: {medium: Memory, sizeLimit: 32Gi}}
