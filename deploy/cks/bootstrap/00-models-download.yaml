# Downloads the three base models to the checkpoints PVC and registers them as W&B
# reference artifacts (pointer to the PVC — no 70GB upload) linked into the model Registry.
# Runs on a CPU node. ~75GB total download; give it time + disk on the checkpoints PVC.
#
# Prereq: the wam-bootstrap-scripts configmap (see 01-pickplace-subset.yaml header).
apiVersion: batch/v1
kind: Job
metadata:
  name: wam-models-download
  namespace: dreamzero
  labels: {app.kubernetes.io/part-of: dreamzero, dreamzero/gate: "wam-models"}
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 172800
  template:
    metadata:
      labels: {app.kubernetes.io/part-of: dreamzero, dreamzero/gate: "wam-models"}
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - {key: nvidia.com/gpu.product, operator: DoesNotExist}   # CPU-only nodes
                  - {key: kubernetes.io/arch, operator: In, values: [amd64]}
      securityContext: {runAsNonRoot: true, runAsUser: 1000, runAsGroup: 1000, fsGroup: 1000, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: download
          image: python:3.12-slim
          command: ["/bin/bash", "-exo", "pipefail", "-c"]
          args:
            - |
              # amd64-only HOME, kept separate from the arm64 training jobs' site-packages
              export HOME=/data/.home-amd64 PIP_CACHE_DIR=/data/.home-amd64/.pip TMPDIR=/data/.home-amd64/.tmp
              export HF_HOME=/data/.hf WANDB_DIR=/data/.home-amd64/.wandb
              mkdir -p $HOME $PIP_CACHE_DIR $TMPDIR $HF_HOME $WANDB_DIR
              python -m pip install --no-cache-dir --quiet "huggingface_hub[hf_transfer]" "wandb>=0.18.0"
              export HF_HUB_ENABLE_HF_TRANSFER=1
              python /scripts/bootstrap_models.py ${MODEL_ONLY:+--only $MODEL_ONLY}
          envFrom: [{secretRef: {name: wandb-api-key}}]
          env:
            - {name: WANDB_ENTITY,           value: encord-wb-physical-ai}
            - {name: WANDB_PROJECT,          value: wam-finetune-webinar}
            - {name: WAM_CHECKPOINTS_ROOT,   value: /checkpoints/wam}
            # Optional HF token for gated/rate-limited repos (create a hf-token secret to enable):
            # - {name: HF_TOKEN, valueFrom: {secretKeyRef: {name: hf-token, key: HF_TOKEN, optional: true}}}
            # Set MODEL_ONLY to register a single model, e.g. "umt5-xxl". Empty = all three.
            - {name: MODEL_ONLY, value: ""}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: false, capabilities: {drop: ["ALL"]}}
          resources:
            requests: {cpu: "4", memory: 16Gi}
            limits:   {cpu: "8", memory: 32Gi}
          volumeMounts:
            - {name: data,        mountPath: /data}
            - {name: checkpoints, mountPath: /checkpoints}
            - {name: scripts,     mountPath: /scripts}
      volumes:
        - {name: data,        persistentVolumeClaim: {claimName: dreamzero-data}}
        - {name: checkpoints, persistentVolumeClaim: {claimName: dreamzero-checkpoints}}
        - {name: scripts,     configMap: {name: wam-bootstrap-scripts}}
