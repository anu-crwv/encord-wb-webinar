# Encord/Trossen FULL fine-tune — MULTI-NODE (2x GH200, arm64), DeepSpeed ZeRO-3 + optimizer offload.
# This is the "best results" run the webinar model ships from: full fine-tune (all 14B DiT params,
# NOT LoRA) of DreamZero on the v4 Encord/Trossen dataset (531 eps / 1.08M frames).
#
# Deltas vs the proven multi-node LoRA manifest (droid-pickplace-train.yaml):
#   - TRAIN_ARCHITECTURE=full         (saves full 14B weights; save_lora_only=false)
#   - LEARNING_RATE=2e-5              (5x below the 1e-4 default: full FT of a pretrained 14B world
#                                      model would otherwise catastrophically forget the video prior)
#   - MAX_STEPS=5000 / SAVE_STEPS=1000 (5 checkpoints spanning the run for eval selection)
#   - DEEPSPEED=configs/deepspeed/zero3_optim_offload.json  (offload the ~168GB fp32 Adam optimizer
#     to Grace host RAM; keep the 14GB param + 14GB grad shards resident in HBM — full FT will not
#     fit HBM otherwise, and full param offload would be far slower over cross-node NCCL)
#   - trossen embodiment + local v4 PVC dataset + dreamzero-trossen-full checkpoint artifact
#
# Topology (unchanged): Indexed Job, 2 pods (1 per GH200 via anti-affinity); rank0 = MASTER via the
# headless wam-train-svc DNS; rank0 owns the shared W&B run + checkpoint upload.
# Prereq: /data/wam/datasets/encord_trossen_v4 built (03-encord-dataset-v4.yaml); repo staged;
# wandb-api-key secret; inject a unique WANDB_RUN_ID (identical on both pods) at apply.
---
apiVersion: v1
kind: Service
metadata:
  name: wam-train-svc
  namespace: dreamzero
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector: {app: wam-train}
  ports:
    - {name: torchrun, port: 29500, targetPort: 29500}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wam-encord-trossen-full
  namespace: dreamzero
  labels: {app.kubernetes.io/part-of: dreamzero, dreamzero/gate: "wam-train"}
spec:
  completionMode: Indexed
  completions: 2
  parallelism: 2
  backoffLimit: 0
  ttlSecondsAfterFinished: 259200
  template:
    metadata:
      labels: {app: wam-train, app.kubernetes.io/part-of: dreamzero, dreamzero/gate: "wam-train"}
    spec:
      restartPolicy: Never
      subdomain: wam-train-svc
      nodeSelector:
        kubernetes.io/arch: arm64
        nvidia.com/gpu.product: NVIDIA-GH200-480GB
      tolerations:
        - {key: is_gpu, value: "true", operator: Equal, effect: PreferNoSchedule}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector: {matchExpressions: [{key: app, operator: In, values: [wam-train]}]}
              topologyKey: kubernetes.io/hostname
      securityContext: {runAsNonRoot: true, runAsUser: 1000, runAsGroup: 1000, fsGroup: 1000, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: train
          image: nvcr.io/nvidia/pytorch:25.04-py3
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-exo", "pipefail", "-c"]
          args:
            - |
              IDX=${JOB_COMPLETION_INDEX:-0}
              export HOME=/data/.home-gh200-$IDX PIP_CACHE_DIR=/data/.home-gh200-$IDX/.pip
              export TMPDIR=/data/.home-gh200-$IDX/.tmp HF_HOME=/data/.hf
              mkdir -p $HOME $PIP_CACHE_DIR $TMPDIR $HF_HOME
              export WAM_REPO_ROOT=/data/src/dreamzero-wam
              export PYTHONPATH=$WAM_REPO_ROOT:${PYTHONPATH:-}
              export PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
              export NODE_RANK=$IDX NNODES=2 NUM_GPUS=1 MASTER_PORT=29500
              export MASTER_ADDR="${JOB_NAME}-0.wam-train-svc.dreamzero.svc.cluster.local"
              # NCCL over the plain-TCP GH200 fabric (no IB): pin eth0, disable IB, force a consistent
              # protocol/algo across ranks (else long ZeRO-3 all-gathers hit a socket-truncate hang).
              export NCCL_SOCKET_IFNAME=eth0 NCCL_IB_DISABLE=1 NCCL_PROTO=simple NCCL_ALGO=Ring
              export NCCL_DEBUG=WARN
              export TORCH_NCCL_BLOCKING_WAIT=1 TORCH_NCCL_ASYNC_ERROR_HANDLING=1
              export TRITON_CACHE_DIR=$TMPDIR/triton; mkdir -p $TRITON_CACHE_DIR
              cd $WAM_REPO_ROOT
              python -m pip install --no-cache-dir --quiet --user -r requirements-train.txt
              DS_NVTX=$(find $HOME/.local/lib -path '*/deepspeed/utils/nvtx.py' 2>/dev/null | head -1)
              if [ -n "$DS_NVTX" ]; then sed -i 's/^enable_nvtx = True/enable_nvtx = False/' "$DS_NVTX"; echo "patched $DS_NVTX (enable_nvtx=False)"; fi
              echo "FULL-FT node_rank=$NODE_RANK master=$MASTER_ADDR run_id=$WANDB_RUN_ID arch=$TRAIN_ARCHITECTURE lr=$LEARNING_RATE steps=$MAX_STEPS ds=$DEEPSPEED"
              bash scripts/train/droid_pickplace.sh
          envFrom: [{secretRef: {name: wandb-api-key}}]
          env:
            - {name: WANDB_ENTITY,   value: encord-wb-physical-ai}
            - {name: WANDB_PROJECT,  value: wam-finetune-webinar}
            - {name: WAM_REGISTRY_ORG, value: encord-wb-webinar}
            - {name: WANDB_RUN_ID,   value: "WAMRUNIDPLACEHOLDER"}   # inject unique value at apply
            - {name: MAX_STEPS,      value: "5000"}
            - {name: SAVE_STEPS,     value: "1000"}
            - {name: TRAIN_ARCHITECTURE, value: "full"}
            - {name: LEARNING_RATE,  value: "2e-5"}
            - {name: PER_DEVICE_BATCH_SIZE, value: "1"}
            - {name: DEEPSPEED,      value: "configs/deepspeed/zero3_optim_offload.json"}
            - {name: USE_AGIBOT_INIT, value: "0"}
            - {name: WAM_TRAIN_TAGS, value: "encord,trossen,full-ft,v4-data"}
            # --- trossen embodiment + local v4 (unregistered) dataset ---
            - {name: DATA_CONFIG,    value: "dreamzero/trossen_relative"}
            - {name: DATA_ROOT_KEY,  value: "trossen_data_root"}
            - {name: WAM_DATASET_LOCAL_DIR, value: "/data/wam/datasets/encord_trossen_v4"}
            - {name: WAM_CKPT_ARTIFACT_NAME, value: "dreamzero-trossen-full"}
            - {name: VIDEO_BACKEND,  value: ""}
            - {name: JOB_NAME, valueFrom: {fieldRef: {fieldPath: "metadata.labels['batch.kubernetes.io/job-name']"}}}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: false, capabilities: {drop: ["ALL"]}}
          ports:
            - {containerPort: 29500, name: torchrun}
          resources:
            requests: {cpu: "16", memory: 220Gi, nvidia.com/gpu: "1"}
            limits:   {cpu: "48", memory: 460Gi, nvidia.com/gpu: "1"}
          volumeMounts:
            - {name: data,        mountPath: /data}
            - {name: checkpoints, mountPath: /checkpoints}
            - {name: dshm,        mountPath: /dev/shm}
      volumes:
        - {name: data,        persistentVolumeClaim: {claimName: dreamzero-data}}
        - {name: checkpoints, persistentVolumeClaim: {claimName: dreamzero-checkpoints}}
        - {name: dshm,        emptyDir: {medium: Memory, sizeLimit: 32Gi}}
